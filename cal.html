<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-400 flex items-center justify-center min-h-screen">
  <div class="bg-green-900 rounded-2xl p-6 w-72 shadow-xl">
    <p class="text-2xl pb-4 font-bold text-yellow-500 justify-center items-center flex">Calculator</p>
    <div id="display" class="bg-green-700 rounded-lg p-4 mb-4 text-right text-white text-2xl font-mono">
      0
    </div>
    <div class="grid grid-cols-4 gap-2">
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="7">7</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="8">8</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="9">9</button>
      <button class="btn btn-op bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="/">/</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="4">4</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="5">5</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="6">6</button>
      <button class="btn btn-op bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="*">*</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="1">1</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="2">2</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="3">3</button>
      <button class="btn btn-op bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="-">-</button>
      <button id="btn-clear" class="btn btn-op bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="C">AC</button>
      <button class="btn btn-num bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="0">0</button>
      <button id="btn-decimal" class="btn btn-op bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value=".">.</button>
      <button class="btn btn-op bg-green-600 rounded-lg p-4 text-white text-xl focus:bg-green-500" data-value="+">+</button>
      <button id="btn-eq" class="btn btn-op bg-green-600 rounded-lg ml-2 px-28 p-1 text-white text-xl font-bold flex items-center justify-center focus:bg-green-500" data-value="=">=</button>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
